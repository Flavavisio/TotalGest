<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Definir nova password — Total Gest</title>
<meta name="robots" content="noindex" />
<meta name="mobile-web-app-capable" content="no" />
<meta name="apple-mobile-web-app-capable" content="no" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#f4f6fa;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;}
  .card{background:#fff;padding:40px;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.1);text-align:center;max-width:400px;width:100%;}
  .dominio{font-size:.72rem;color:#94a3b8;margin-bottom:10px;letter-spacing:.03em;}
  .logo{display:block;margin:0 auto 20px;height:56px;}
  h1{font-size:1.2rem;color:#0b3b5c;margin:0 0 10px;}
  h1.ok{color:#16a34a;}
  h1.erro{color:#dc2626;}
  p{color:#5a6781;font-size:.9rem;margin:0 0 20px;line-height:1.5;}
  .campo{position:relative;text-align:left;margin-bottom:14px;}
  .campo label{display:block;font-size:.78rem;font-weight:600;color:#152a52;margin-bottom:4px;}
  .campo input{width:100%;box-sizing:border-box;padding:10px 38px 10px 12px;border:1px solid #e6eaf2;border-radius:10px;font-size:.9rem;}
  .campo button{position:absolute;right:8px;top:30px;background:none;border:none;color:#5a6781;cursor:pointer;padding:4px;font-size:.9rem;}
  .msg{font-size:.76rem;margin:-4px 0 14px;text-align:left;min-height:16px;}
  .botao{display:block;width:100%;box-sizing:border-box;background:linear-gradient(135deg,#ff7a18,#f4520e);color:#000;border:2px solid #0b1a2c;padding:13px;border-radius:12px;font-weight:700;font-size:.95rem;cursor:pointer;margin-top:6px;text-decoration:none;}
  .botao:disabled{opacity:.6;cursor:default;}
  .selo{display:inline-block;background:#ecfdf5;color:#16a34a;font-weight:700;font-size:.8rem;padding:6px 14px;border-radius:999px;margin-bottom:14px;}
  .spinner{width:34px;height:34px;border:4px solid #e6eaf2;border-top-color:#f4520e;border-radius:50%;margin:0 auto 18px;animation:girar 0.8s linear infinite;}
  @keyframes girar{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
  <div class="card" id="cartao">
    <div class="dominio">🔒 totalgest.pt</div>
    <img class="logo" src="logo-totalgest.png" alt="Total Gest" />
    <div class="spinner"></div>
    <h1>A verificar o link…</h1>
    <p>Só demora um instante.</p>
  </div>

  <script>
    var SUPABASE_URL = 'https://rfniufasivfnrqfntzog.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmbml1ZmFzaXZmbnJxZm50em9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzI2MjcsImV4cCI6MjA5NzQ0ODYyN30.1hJ7JBpCKo-Wp93HM5skXVnYk3ghyC7mo0rubbvCXyI';
    var supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    var cartao = document.getElementById('cartao');

    function senhaValida(s) {
      return s.length >= 9 && /[A-Z]/.test(s) && /[^A-Za-z0-9]/.test(s);
    }

    function mostrarErro(titulo, mensagem) {
      cartao.innerHTML =
        '<div class="dominio">🔒 totalgest.pt</div>' +
        '<img class="logo" src="logo-totalgest.png" alt="Total Gest" />' +
        '<h1 class="erro">' + titulo + '</h1>' +
        '<p>' + mensagem + '</p>' +
        '<a class="botao" href="https://www.totalgest.pt/#tg-entrar">Voltar ao login</a>';
    }

    function mostrarFormulario() {
      cartao.innerHTML =
        '<div class="dominio">🔒 totalgest.pt</div>' +
        '<img class="logo" src="logo-totalgest.png" alt="Total Gest" />' +
        '<h1>Defina a sua nova password</h1>' +
        '<p>Escolha uma password segura para a sua conta.</p>' +
        '<div class="campo">' +
          '<label>Nova password</label>' +
          '<input type="password" id="rp_senha" placeholder="Mínimo 9 caracteres, 1 maiúscula, 1 símbolo" />' +
          '<button type="button" id="rp_olho1">👁</button>' +
        '</div>' +
        '<div class="campo">' +
          '<label>Confirmar password</label>' +
          '<input type="password" id="rp_senha2" placeholder="Repita a password" />' +
          '<button type="button" id="rp_olho2">👁</button>' +
        '</div>' +
        '<div class="msg" id="rp_msg"></div>' +
        '<button class="botao" id="rp_botao">Guardar nova password</button>';

      function alternarOlho(idCampo, btn) {
        var campo = document.getElementById(idCampo);
        if (campo.type === 'password') { campo.type = 'text'; btn.textContent = '🙈'; }
        else { campo.type = 'password'; btn.textContent = '👁'; }
      }
      document.getElementById('rp_olho1').onclick = function () { alternarOlho('rp_senha', this); };
      document.getElementById('rp_olho2').onclick = function () { alternarOlho('rp_senha2', this); };

      function validar() {
        var s1 = document.getElementById('rp_senha').value;
        var s2 = document.getElementById('rp_senha2').value;
        var msg = document.getElementById('rp_msg');
        if (!s1) { msg.textContent = ''; return; }
        if (!senhaValida(s1)) {
          msg.textContent = 'Precisa de pelo menos 9 caracteres, 1 maiúscula e 1 símbolo.';
          msg.style.color = '#dc2626';
          return;
        }
        if (s2 && s1 !== s2) {
          msg.textContent = 'As passwords não coincidem.';
          msg.style.color = '#dc2626';
          return;
        }
        msg.textContent = s2 ? '✓ Password válida.' : 'Password válida — confirme-a abaixo.';
        msg.style.color = '#16a34a';
      }
      document.getElementById('rp_senha').addEventListener('input', validar);
      document.getElementById('rp_senha2').addEventListener('input', validar);

      document.getElementById('rp_botao').onclick = async function () {
        var s1 = document.getElementById('rp_senha').value;
        var s2 = document.getElementById('rp_senha2').value;
        if (!senhaValida(s1)) { alert('A password precisa de pelo menos 9 caracteres, 1 maiúscula e 1 símbolo.'); return; }
        if (s1 !== s2) { alert('As passwords não coincidem.'); return; }
        var btn = document.getElementById('rp_botao');
        btn.disabled = true;
        btn.textContent = 'A guardar…';
        try {
          var { error } = await supa.auth.updateUser({ password: s1 });
          if (error) throw error;
          cartao.innerHTML =
            '<div class="dominio">🔒 totalgest.pt</div>' +
            '<img class="logo" src="logo-totalgest.png" alt="Total Gest" />' +
            '<div class="selo">✓ Password alterada</div>' +
            '<h1 class="ok">Tudo pronto!</h1>' +
            '<p>A sua password foi alterada com sucesso. Já pode entrar com a nova password.</p>' +
            '<a class="botao" href="https://www.totalgest.pt/#tg-entrar">Ir para o login</a>';
        } catch (e) {
          alert('Não foi possível guardar a nova password: ' + (e && e.message ? e.message : 'tente novamente.'));
          btn.disabled = false;
          btn.textContent = 'Guardar nova password';
        }
      };
    }

    // O Supabase deteta automaticamente o token de recuperação na URL (hash) ao carregar a página.
    // Esperamos pelo evento PASSWORD_RECOVERY antes de mostrar o formulário.
    var jaMostrou = false;
    supa.auth.onAuthStateChange(function (evento, sessao) {
      if (evento === 'PASSWORD_RECOVERY' && !jaMostrou) {
        jaMostrou = true;
        mostrarFormulario();
      }
    });

    // Se passados alguns segundos o evento não disparar, o link provavelmente é inválido/expirado
    setTimeout(function () {
      if (!jaMostrou) {
        mostrarErro('Link inválido ou expirado', 'Este link de recuperação já não é válido. Volte ao site e peça um novo através de "Esqueci-me da password".');
      }
    }, 4000);
  </script>
</body>
</html>

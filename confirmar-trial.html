<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Confirmar conta — Total Gest</title>
<meta name="robots" content="noindex" />
<!-- Impede que este link abra dentro da app instalada (PWA) em vez do browser normal —
     assim quem recebe o email vê sempre a barra de endereço (totalgest.pt) antes de clicar,
     o que ajuda a confiar que a página é legítima. -->
<meta name="mobile-web-app-capable" content="no" />
<meta name="apple-mobile-web-app-capable" content="no" />
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#f4f6fa;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;}
  .card{background:#fff;padding:40px;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.1);text-align:center;max-width:420px;}
  .logo{display:block;margin:0 auto 20px;height:56px;}
  h1{font-size:1.25rem;margin:0 0 12px;}
  h1.ok{color:#16a34a;}
  h1.erro{color:#dc2626;}
  p{color:#5a6781;font-size:.92rem;margin:0 0 10px;line-height:1.5;}
  .botao{display:inline-block;background:#f4520e;color:#fff;padding:14px 30px;border-radius:10px;text-decoration:none;font-weight:bold;margin-top:14px;}
  .selo{display:inline-block;background:#ecfdf5;color:#16a34a;font-weight:700;font-size:.8rem;padding:6px 14px;border-radius:999px;margin-bottom:14px;}
  .spinner{width:34px;height:34px;border:4px solid #e6eaf2;border-top-color:#f4520e;border-radius:50%;margin:0 auto 18px;animation:girar 0.8s linear infinite;}
  @keyframes girar{ to{ transform:rotate(360deg); } }
  .aviso{color:#b45309;font-size:.8rem;margin-top:18px;}
</style>
</head>
<body>
  <div class="card" id="cartao">
    <div style="font-size:.72rem;color:#94a3b8;margin-bottom:10px;letter-spacing:.03em;">🔒 totalgest.pt</div>
    <img class="logo" src="logo-totalgest.png" alt="Total Gest" />
    <h1>Confirme a sua conta Total Gest</h1>
    <p>Clique no botão abaixo para ativar a sua conta de teste de 30 dias.</p>
    <a class="botao" id="botaoConfirmar" href="#">Confirmar conta</a>
    <p class="aviso" id="avisoSemCodigo" style="display:none;">Este link não parece válido. Verifique se copiou o endereço completo do email.</p>
  </div>

  <script>
    var FUNCAO_URL = 'https://rfniufasivfnrqfntzog.supabase.co/functions/v1/confirmar-trial';

    function obterToken() {
      var partes = window.location.search.replace('?', '').split('&');
      for (var i = 0; i < partes.length; i++) {
        var par = partes[i].split('=');
        if (par[0] === 'token') return decodeURIComponent(par[1] || '');
      }
      return '';
    }

    function mostrarResultado(titulo, mensagem, sucesso) {
      var extra = sucesso
        ? '<p style="margin-top:16px;">A sua conta fica ativa gratuitamente durante <strong>30 dias</strong>. Pode adquirir o seu plano a qualquer momento, sem perder nada do que já configurou.</p>' +
          '<a class="botao" href="https://www.totalgest.pt/#tg-entrar">Entrar agora</a>'
        : '<a class="botao" href="https://www.totalgest.pt/">Voltar ao site</a>';
      document.getElementById('cartao').innerHTML =
        '<div style="font-size:.72rem;color:#94a3b8;margin-bottom:10px;letter-spacing:.03em;">🔒 totalgest.pt</div>' +
        '<img class="logo" src="logo-totalgest.png" alt="Total Gest" />' +
        (sucesso ? '<div class="selo">✓ Conta ativada</div>' : '') +
        '<h1 class="' + (sucesso ? 'ok' : 'erro') + '">' + titulo + '</h1>' +
        '<p>' + mensagem + '</p>' + extra;
    }

    function confirmarConta(token) {
      document.getElementById('cartao').innerHTML =
        '<div class="spinner"></div><h1>A ativar a sua conta…</h1><p>Só demora um instante.</p>';
      fetch(FUNCAO_URL + '?token=' + encodeURIComponent(token))
        .then(function (r) { return r.json().then(function (dados) { return { status: r.status, dados: dados }; }); })
        .then(function (res) {
          mostrarResultado(res.dados.titulo, res.dados.mensagem, !!res.dados.sucesso);
        })
        .catch(function () {
          mostrarResultado('Ocorreu um erro', 'Não foi possível ligar ao servidor. Tente novamente dentro de momentos ou contacte-nos.', false);
        });
    }

    (function () {
      var token = obterToken();
      var botao = document.getElementById('botaoConfirmar');
      if (!token) {
        botao.style.display = 'none';
        document.getElementById('avisoSemCodigo').style.display = 'block';
        return;
      }
      botao.addEventListener('click', function (ev) {
        ev.preventDefault();
        confirmarConta(token);
      });
    })();
  </script>
</body>
</html>
